manifestVersion: 1
name: "@kneel/nextcloud"
version: "2026.07.20.1"
description: |
  Drive a [Nextcloud](https://nextcloud.com/) instance from swamp over its
  CalDAV / CardDAV / WebDAV / OCS surfaces using an app-password (HTTP Basic) credential —
  a first-class swamp node for a self-hosted cloud.

  The model's first job is **event-level calendar sync**: upsert real VEVENTs
  (keyed by `iCalUID`) into a Nextcloud calendar so a source calendar — e.g. a
  Google calendar read by `@swamp/gcp/calendar` — appears as editable native
  events that propagate to every CalDAV client, with swamp in the data path.

  ## Methods

  - **whoami** — verify app-password auth via OCS `cloud/user`; record the
    authenticated `{userId, displayName, email}`. Auth smoke-test.
  - **list_calendars** — PROPFIND the user's calendar home; record calendars as
    `{displayName, path, color, hasSource}`. Webcal subscription **source URLs
    are masked** (recorded as a boolean, never persisted).
  - **create_calendar** — provision a calendar collection via `MKCALENDAR`
    (idempotent: an existing collection reports `created=false`, not an error).
  - **list_events** — CalDAV `calendar-query` REPORT over a time window; records
    `{uid, dtstart, hasProvenance}` per event — **UID/DTSTART/provenance only,
    no PII**. The read side of reconciliation.
  - **put_events** — Rule-6 fan-out: CalDAV `PUT` a whole batch of events as
    VEVENTs keyed by `iCalUID` (idempotent upsert). Every VEVENT is stamped with
    the `X-SWAMP-SYNC` provenance marker and recurring timed events keep their
    `TZID` (DST-correct expansion). Records UIDs + per-item outcomes only — no
    event PII. An empty batch is a no-op.
  - **delete_events** — Rule-6 fan-out: verify-then-`DELETE` events by
    `iCalUID` (idempotent). By default (`requireProvenance=true`) it refuses to
    delete any event lacking the `X-SWAMP-SYNC` marker, so foreign events sharing
    the calendar are never removed. Supports `dryRun=true` to preview
    (`would-delete`) without mutating. An empty batch is a no-op.

  ## Security

  - `appPassword` is a **sensitive** global argument — wire it to a vault at
    model-create time, never inline.
  - `baseUrl` is refined to require `https://` (Basic auth is only protected by
    TLS).
  - The `Authorization` header is never logged; event PII (SUMMARY/DESCRIPTION/
    LOCATION/raw VEVENT bodies) is never logged and never persisted in resource
    snapshots.

  ## Quickstart

  ```bash
  # 1. store the app password in a vault
  swamp vault put nextcloud appPassword     # hidden prompt

  # 2. create the model, wiring the sensitive arg from the vault
  swamp model create @kneel/nextcloud nc \
    --global-arg baseUrl=https://cloud.example.com \
    --global-arg username=neil \
    --global-arg appPassword='${{ vault.get(nextcloud, appPassword) }}'

  swamp model method run nc whoami          # auth proof
  swamp model method run nc list_calendars  # discover the target calendar
  ```

  Reference recorded data with CEL:

  ```
  data.latest("nc", "main").attributes.calendars
  ```
repository: "https://github.com/NeilHanlon/swamp-nextcloud"
paths:
  base: manifest
models:
  - nextcloud.ts
additionalFiles:
  - README.md
  - LICENSE.txt
labels:
